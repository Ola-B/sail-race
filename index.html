<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sail-Race</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header section with title -->
        <header>
            <h1>Sail-Race</h1>
        </header>

        <!-- Control buttons section: allows user to mark start boat position, line end, and start countdown -->
        <section class="controls">
            <div class="controls-row mark-controls">
                <button id="markStartBoatBtn" class="btn mark-btn">
                    <span class="btn-title">Mark Start Boat</span>
                    <span class="btn-meta" id="startBoatStatus">Tap to save current GPS position</span>
                </button>
                <button id="markLineEndBtn" class="btn mark-btn">
                    <span class="btn-title">Mark Line End</span>
                    <span class="btn-meta" id="lineEndStatus">Tap to save current GPS position</span>
                </button>
            </div>
            <div class="controls-row countdown-controls">
                <button id="startCountdownBtn" class="btn">START</button>
                <button id="syncCountdownBtn" class="btn control-btn" disabled>SYNC</button>
                <button id="resetCountdownBtn" class="btn control-btn">RESET</button>
            </div>
        </section>

        <!-- Main metrics display area: center shows distance, surrounding boxes show speed, bearing, and timer -->
        <section class="metrics-container">
            <!-- Distance to startline - the primary metric, displayed prominently in the center -->
            <div class="metric-box distance-box">
                <div class="metric-header">
                    <div class="metric-label">Distance to Startline</div>
                    <div class="metric-unit">meters</div>
                </div>
                <div class="metric-value" id="distanceValue">--</div>
            </div>

            <!-- Countdown/elapsed time timer - counts down 5 minutes, then counts up after T=0 -->
            <div class="metric-box timer-box">
                <div class="metric-header">
                    <div class="metric-label">Countdown / Elapsed</div>
                    <div class="metric-unit">MM:SS</div>
                </div>
                <div class="metric-value" id="timerValue">05:00</div>
            </div>

            <!-- Boat speed in knots - extracted from GPS heading data -->
            <div class="metric-box">
                <div class="metric-header">
                    <div class="metric-label">Boat Speed</div>
                    <div class="metric-unit">knots</div>
                </div>
                <div class="metric-value" id="speedValue">--</div>
            </div>

            <!-- Bearing/heading in degrees - extracted from GPS heading data -->
            <div class="metric-box">
                <div class="metric-header">
                    <div class="metric-label">Bearing</div>
                    <div class="metric-unit">degrees</div>
                </div>
                <div class="metric-value" id="bearingValue">--</div>
            </div>
        </section>

        <!-- Footer status panel: shows GPS state and current position at the bottom of the app -->
        <section class="info-section status-footer">
            <div class="info-item">
                <span class="info-label">GPS Status:</span>
                <span class="gps-status" id="gpsStatus">Status: Initializing...</span>
            </div>
            <div class="info-item">
                <span class="info-label">Current Position:</span>
                <span class="info-value" id="currentPosInfo">Acquiring...</span>
                <span class="info-meta" id="lastPositionTime">Last fix: --:--:--</span>
            </div>
        </section>
    </div>

    <!-- Load turf.js library from CDN for geometric calculations (distance-to-line) -->
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
    <!-- Load main application logic -->
    <script src="app.js"></script>
</body>
</html>
